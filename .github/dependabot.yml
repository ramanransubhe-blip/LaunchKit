version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 15
    reviewers:
      - ramanransubhe-blip
    labels:
      - dependencies
      - auto-merge
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - typescript-eslint
      testing:
        patterns:
          - vitest
          - "@vitest/*"
          - "@testing-library/*"
    ignore:
      - dependency-name: next
        update-types:
          - version-update:semver-major
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    reviewers:
      - ramanransubhe-blip
    labels:
      - dependencies
      - ci
      - auto-merge
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
